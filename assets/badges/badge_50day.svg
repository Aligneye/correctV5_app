  <!-- 5-point star inner face -->
  <polygon points="105.0,37.0 123.8,89.1 179.2,90.9 135.4,124.9 150.8,178.1 105.0,147.0 59.2,178.1 74.6,124.9 30.8,90.9 86.2,89.1"
           fill="url(#face50b)" stroke="#F8FAFC" stroke-width="4"/>

  <!-- circular badge plate in center, sheriff-star style -->
  <circle cx="105" cy="112" r="34" fill="none" stroke="#F8FAFC" stroke-width="2.5" opacity="0.8"/>
  <circle cx="105" cy="112" r="27" fill="none" stroke="#F8FAFC" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.6"/>

